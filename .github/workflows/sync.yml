name: Sync Image to Aliyun

on:
  push:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 登录阿里云镜像仓库
        uses: docker/login-action@v3
        with:
          registry: registry.cn-beijing.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: 拉取并推送 kube-webhook-certgen 镜像
        run: |
          docker pull registry.k8s.io/ingress-nginx/kube-webhook-certgen:v1.1.1
          docker tag registry.k8s.io/ingress-nginx/kube-webhook-certgen:v1.1.1 registry.cn-beijing.aliyuncs.com/wordpress-duanfeiyu/kube-webhook-certgen:v1.1.1
          docker push registry.cn-beijing.aliyuncs.com/wordpress-duanfeiyu/kube-webhook-certgen:v1.1.1
